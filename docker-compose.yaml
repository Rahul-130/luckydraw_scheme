services:
  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle_db
    restart: unless-stopped
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -L \"${ORACLE_USER}/${ORACLE_PASSWORD}@//localhost:1521/XE\" AS SYSDBA @$ORACLE_HOME/rdbms/admin/utlprp.sql || exit 1"]
      interval: 1m
      timeout: 20s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luckydraw_app
    restart: unless-stopped
    ports: # Expose ports for development
      - "3000:3000" # Frontend
      - "4000:4000" # Backend
    env_file:
      - ./.env
    environment:
      - ORACLE_HOST=oracle
      - ORACLE_PORT=1521
      - ORACLE_SERVICE_NAME=XEPDB1
      - PORT=4000 # Your backend/server.js uses this port
    depends_on:
      oracle:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules # Anonymous volume to prevent host node_modules from overwriting container's

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_luckydraw
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - ./.env
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - oracle

volumes:
  oracle_data:
  n8n_data:
